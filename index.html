    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .landing-container {
            max-width: 500px;

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;

        @keyframes fadeInUp {
            from {
                opacity: 0;

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 25px;
            display: flex;

            margin: 0 auto 20px;

        .logo-icon i {

        h1 {

        .subtitle {

        }
        
        .code-display-area {
            background: #f8fafc;

        .code-display-area.active {
            border-color: #22c55e;
            background: linear-gradient(135deg, #f0fdf4, #ffffff);
        }
        
        .code-label {
            font-size: 14px;

            color: #475569;
            margin-bottom: 15px;

        .code-value {
            font-size: 42px;
            font-weight: 800;
            font-family: 'Monaco', 'Courier New', monospace;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #1e293b, #334155);
            -webkit-background-clip: text;

            background-clip: text;

        }
        
        .code-placeholder {
            font-size: 32px;
            font-weight: 700;
            color: #cbd5e1;
            font-family: monospace;
            letter-spacing: 2px;
        }
        
        .get-code-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 18px;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
        }
        
        .get-code-btn:active {
            transform: scale(0.98);
        }
        
        .get-code-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .copy-btn {
            width: 100%;
            background: #1e293b;
            border: none;
            padding: 14px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .copy-btn:active {
            transform: scale(0.98);
        }
        
        .copy-btn.copied {
            background: #22c55e;
        }
        
        .info-box {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
        }
        
        .info-box p {
            font-size: 13px;
            color: #475569;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-box i {
            color: #667eea;
            width: 20px;
        }
        
        .timer-text {
            font-size: 12px;
            color: #f97316;
            margin-top: 10px;
            font-weight: 500;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: #667eea;
        }
        
        .toast-alert {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            animation: slideUp 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            white-space: nowrap;
        }
        
        .toast-alert.success {
            background: #22c55e;
        }
        
        .toast-alert.warning {
            background: #f97316;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        /* Loading Animation */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .card {
                padding: 25px 20px;
            }
            .code-value {
                font-size: 28px;
                letter-spacing: 2px;
            }

<body>
    <div class="landing-container">
        <div class="card">
            <div class="logo-icon">
                <i class="fas fa-code"></i>
            </div>
            <h1>কোড কালেক্টর</h1>
            <p class="subtitle">আপনার এক্সক্লুসিভ কোড সংগ্রহ করুন এবং ১৫ টাকা বোনাস পান</p>
            
            <div class="code-display-area" id="codeDisplayArea">
                <div class="code-label">
                    <i class="fas fa-lock"></i> আপনার কোড
                </div>
                <div id="codeValue" class="code-placeholder">
                    🔒 লুকানো আছে
                </div>
            </div>
            
            <button class="get-code-btn" id="getCodeBtn">
                <i class="fas fa-download"></i>
                <span>কোড সংগ্রহ করুন</span>
            </button>
            
            <button class="copy-btn" id="copyBtn" disabled style="opacity: 0.5;">
                <i class="fas fa-copy"></i>
                <span>কপি করুন</span>
            </button>
            
            <div class="info-box">
                <p><i class="fas fa-check-circle"></i> প্রতিটি কোড শুধুমাত্র একবার ব্যবহারযোগ্য</p>
                <p><i class="fas fa-clock"></i> কোড সংগ্রহ করার পর ২৪ ঘন্টার মধ্যে ব্যবহার করুন</p>
                <p><i class="fas fa-gift"></i> সঠিক কোড সাবমিট করলে ১৫ টাকা বোনাস পাবেন</p>
                <p><i class="fas fa-arrow-left"></i> কোড কপি করে অ্যাপের "শর্ট অ্যাড" এ সাবমিট করুন</p>
            </div>
            
            <div id="timerText" class="timer-text"></div>
            
            <a href="#" onclick="goToApp()" class="back-link">
                <i class="fas fa-arrow-left"></i> অ্যাপে ফিরে যান
            </a>
        </div>
    </div>
    
    <script>
        // ==================== CONFIGURATION (Hidden from user) ====================
        // All valid codes are stored in the script - users cannot see them unless they collect
        const VALID_CODES = [
            "MP2025",
        ];
        
        // Track used codes globally (in localStorage)
        let usedCodes = new Set();
        let currentRevealedCode = null;
        let codeRevealed = false;
        let canReveal = true;
        
        // Load used codes from localStorage
        function loadUsedCodes() {
            const stored = localStorage.getItem('collected_codes_used');
            if (stored) {
                usedCodes = new Set(JSON.parse(stored));
            }
            
            // Also check if user has already collected a code today
            const lastCollection = localStorage.getItem('last_code_collection_time');
            const now = Date.now();
            const cooldownHours = 24; // 24 hour cooldown between code collections
            
            if (lastCollection && (now - parseInt(lastCollection)) < cooldownHours * 60 * 60 * 1000) {
                canReveal = false;
                const remaining = cooldownHours * 60 * 60 * 1000 - (now - parseInt(lastCollection));
                updateTimerDisplay(remaining);
            }
        }
        
        function saveUsedCodes() {
            localStorage.setItem('collected_codes_used', JSON.stringify(Array.from(usedCodes)));
        }
        
        function updateTimerDisplay(remainingMs) {
            const timerDiv = document.getElementById('timerText');
            if (remainingMs > 0) {
                const hours = Math.floor(remainingMs / 3600000);
                const minutes = Math.floor((remainingMs % 3600000) / 60000);
                const seconds = Math.floor((remainingMs % 60000) / 1000);
                timerDiv.innerHTML = `<i class="fas fa-hourglass-half"></i> পরবর্তী কোড পেতে ${hours} ঘন্টা ${minutes} মিনিট ${seconds} সেকেন্ড অপেক্ষা করুন`;
                timerDiv.style.display = 'block';
            } else {
                timerDiv.style.display = 'none';
            }
        }
        
        // Get available code (not used yet)
        function getAvailableCode() {
            const availableCodes = VALID_CODES.filter(code => !usedCodes.has(code));
            if (availableCodes.length === 0) {
                return null;
            }
            // Randomly select one available code
            const randomIndex = Math.floor(Math.random() * availableCodes.length);
            return availableCodes[randomIndex];
        }
        
        function revealCode() {
            if (!canReveal) {
                showToast("আপনি ইতিমধ্যে আজ একটি কোড সংগ্রহ করেছেন! ২৪ ঘন্টা পর আবার চেষ্টা করুন।", "warning");
                return;
            }
            
            const availableCode = getAvailableCode();
            if (!availableCode) {
                showToast("সব কোড ব্যবহার হয়ে গেছে! নতুন কোড শীঘ্রই যোগ করা হবে।", "warning");
                return;
            }
            
            // Reveal the code
            currentRevealedCode = availableCode;
            codeRevealed = true;
            
            // Update UI
            const codeValueDiv = document.getElementById('codeValue');
            codeValueDiv.className = 'code-value';
            codeValueDiv.innerHTML = `<i class="fas fa-key"></i> ${currentRevealedCode}`;
            
            const displayArea = document.getElementById('codeDisplayArea');
            displayArea.classList.add('active');
            
            // Enable copy button
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.disabled = false;
            copyBtn.style.opacity = '1';
            
            // Disable get code button
            const getBtn = document.getElementById('getCodeBtn');
            getBtn.disabled = true;
            getBtn.style.opacity = '0.6';
            
            // Save that user collected a code
            localStorage.setItem('last_code_collection_time', Date.now().toString());
            localStorage.setItem('collected_code', currentRevealedCode);
            canReveal = false;
            
            // Mark this code as used in collected list (but not in main app yet)
            // The code is only marked as "collected" not "used" - user still needs to submit in app
            // We don't add to usedCodes here because user might not submit it in the app
            // The app will mark it as used when submitted
            
            // Start timer for next collection
            const remainingMs = 24 * 60 * 60 * 1000;
            updateTimerDisplay(remainingMs);
            
            // Start countdown timer
            startCountdown(remainingMs);
            
            showToast(`🎉 আপনার কোড: ${currentRevealedCode}`, "success");
        }
        
        let countdownInterval = null;
        
        function startCountdown(initialRemaining) {
            if (countdownInterval) clearInterval(countdownInterval);
            
            let remaining = initialRemaining;
            
            countdownInterval = setInterval(() => {
                remaining -= 1000;
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    canReveal = true;
                    document.getElementById('timerText').style.display = 'none';
                    const getBtn = document.getElementById('getCodeBtn');
                    getBtn.disabled = false;
                    getBtn.style.opacity = '1';
                    showToast("আপনি এখন一个新的 কোড সংগ্রহ করতে পারেন!", "success");
                } else {
                    updateTimerDisplay(remaining);
                }
            }, 1000);
        }
        
        function copyCode() {
            if (!codeRevealed || !currentRevealedCode) {
                showToast("কোড সংগ্রহ করুন প্রথমে!", "warning");
                return;
            }
            
            navigator.clipboard.writeText(currentRevealedCode).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.classList.add('copied');
                copyBtn.innerHTML = '<i class="fas fa-check"></i> <span>কপি করা হয়েছে!</span>';
                showToast("✅ কোড কপি করা হয়েছে! অ্যাপে গিয়ে সাবমিট করুন।", "success");
                
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.innerHTML = '<i class="fas fa-copy"></i> <span>কপি করুন</span>';
                }, 2000);
            }).catch(() => {
                showToast("কপি করতে ব্যর্থ হয়েছে। ম্যানুয়ালি কপি করুন।", "error");
            });
        }
        
        function showToast(message, type = "info") {
            const toast = document.createElement("div");
            toast.className = `toast-alert ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function goToApp() {
            // Try to close current WebApp view and return to main app
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.close();
            } else {
                window.location.href = "index.html";
            }
        }
        
        // Check if user has already collected a code today and show it
        function loadExistingCollectedCode() {
            const lastCollection = localStorage.getItem('last_code_collection_time');
            const collectedCode = localStorage.getItem('collected_code');
            const now = Date.now();
            const cooldownHours = 24;
            
            if (lastCollection && collectedCode && (now - parseInt(lastCollection)) < cooldownHours * 60 * 60 * 1000) {
                // User already has a collected code that is still valid
                currentRevealedCode = collectedCode;
                codeRevealed = true;
                canReveal = false;
                
                const codeValueDiv = document.getElementById('codeValue');
                codeValueDiv.className = 'code-value';
                codeValueDiv.innerHTML = `<i class="fas fa-key"></i> ${currentRevealedCode}`;
                
                const displayArea = document.getElementById('codeDisplayArea');
                displayArea.classList.add('active');
                
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.disabled = false;
                copyBtn.style.opacity = '1';
                
                const getBtn = document.getElementById('getCodeBtn');
                getBtn.disabled = true;
                getBtn.style.opacity = '0.6';
                
                const remaining = cooldownHours * 60 * 60 * 1000 - (now - parseInt(lastCollection));
                updateTimerDisplay(remaining);
                startCountdown(remaining);
            }
        }
        
        // Also need to check if the collected code was already used in the main app
        // We can check from main app's localStorage
        function checkIfCodeAlreadyUsed() {
            const collectedCode = localStorage.getItem('collected_code');
            if (!collectedCode) return;
            
            // Try to get main app user data to check if code was used
            // Look for any user data in localStorage that might contain usedCodes
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('user_')) {
                    try {
                        const userData = JSON.parse(localStorage.getItem(key));
                        if (userData && userData.usedCodes && userData.usedCodes.includes(collectedCode)) {
                            // Code was used, clear it so user can get new code
                            localStorage.removeItem('collected_code');
                            localStorage.removeItem('last_code_collection_time');
                            showToast("আপনার আগের কোড ব্যবহার করা হয়েছে! এখন一个新的 কোড নিতে পারেন।", "success");
                            window.location.reload();
                        }
                    } catch(e) {}
                }
            }
        }
        
        // Event Listeners
        document.getElementById('getCodeBtn').addEventListener('click', revealCode);
        document.getElementById('copyBtn').addEventListener('click', copyCode);
        
        // Initialize
        loadUsedCodes();
        loadExistingCollectedCode();
        checkIfCodeAlreadyUsed();
        
        // Add animation to button on hover
        const getBtn = document.getElementById('getCodeBtn');
        getBtn.addEventListener('mouseenter', () => {
            if (!getBtn.disabled) {
                getBtn.style.transform = 'translateY(-2px)';
            }
        });
        getBtn.addEventListener('mouseleave', () => {
            getBtn.style.transform = 'translateY(0)';
        });
        
        // Check for Telegram WebApp to set theme
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            
            // Set theme color
            if (tg.colorScheme === 'dark') {
                document.body.style.background = 'linear-gradient(135deg, #1e293b, #0f172a)';
            }
        }
    </script>
</body>
